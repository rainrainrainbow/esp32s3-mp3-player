name: ESP32-S3 MP3 Player Build
on:
  push:
    branches: [ main, minimal-player ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v6.1
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          idf.py build
      - name: Generate storage
        shell: bash
        run: |
          apt-get update -qq && apt-get install -y -qq dosfstools mtools 2>/dev/null || true
          python3 -c "import struct,math; p=b''; exec('for i in range(44100*5):p+=struct.pack(\"<h\",int(32767*0.3*math.sin(2*math.pi*440*i/44100)))'); open('test.raw','wb').write(p)"
          ffmpeg -f s16le -ar 44100 -ac 1 -i test.raw -codec:a libmp3lame -b:a 128k -y test.mp3 2>/dev/null || (apt-get install -y -qq ffmpeg 2>/dev/null && ffmpeg -f s16le -ar 44100 -ac 1 -i test.raw -codec:a libmp3lame -b:a 128k -y test.mp3 2>/dev/null)
          python3 -c "import struct; w,h=240,320; rs=(w*3+3)&~3; open('test.bmp','wb').write(struct.pack('<HIHHI',0x4D42,14+40+rs*h,0,0,54)+struct.pack('<IiiHHIIiiII',40,w,h,1,24,0,rs*h,0,0,0,0)); f=open('test.bmp','ab'); [f.write(struct.pack('BBB',int(255*(h-y)/h),0,0)+b'\\x00'*(rs-w*3)) for y in range(h)]; f.close()"
          dd if=/dev/zero of=storage.img bs=1024 count=12032 2>/dev/null
          mkfs.fat -F 16 -S 4096 storage.img 2>/dev/null
          mmd -i storage.img ::/music 2>/dev/null || true
          mmd -i storage.img ::/images 2>/dev/null || true
          mmd -i storage.img ::/images/1 2>/dev/null || true
          mcopy -i storage.img test.mp3 ::/music/1.mp3 2>/dev/null
          mcopy -i storage.img test.bmp ::/images/1/1.bmp 2>/dev/null
      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          for f in build/bootloader/bootloader.bin build/partition_table/partition-table.bin build/esp32s3_mp3_player.bin; do
            if [ -f "$f" ]; then cp "$f" artifacts/; fi
          done
          cp storage.img artifacts/
          pip3 install esptool 2>/dev/null || true
          python3 -m esptool --chip esp32s3 merge_bin --output artifacts/firmware_complete.bin --flash_mode qio --flash_freq 80m --flash_size 16MB 0x0 artifacts/bootloader.bin 0x8000 artifacts/partition-table.bin 0x10000 artifacts/esp32s3_mp3_player.bin 0x310000 artifacts/storage.img || true
          ls -la artifacts/
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-mp3-player-firmware
          path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/minimal-player'
        with:
          tag_name: build-${{ github.run_number }}
          name: "ESP32-S3 MP3 Player Build #${{ github.run_number }}"
          files: artifacts/*.bin
          make_latest: true
