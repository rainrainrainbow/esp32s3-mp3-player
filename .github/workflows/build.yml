name: ESP32-S3 MP3 Player Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v4.4
          target: esp32s3
          build_dir: ./build

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          for f in build/bootloader/bootloader.bin build/partition_table/partition-table.bin build/esp32s3_mp3_player.bin; do
            if [ -f "$f" ]; then
              cp "$f" artifacts/
              echo "Copied: $f"
            fi
          done
          pip install esptool 2>/dev/null
          python3 -m esptool --chip esp32s3 merge_bin             --output artifacts/firmware_merged.bin             --flash_mode qio --flash_freq 80m --flash_size 16MB             0x0000 artifacts/bootloader.bin             0x8000 artifacts/partition-table.bin             0x10000 artifacts/esp32s3_mp3_player.bin || true
          ls -la artifacts/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-mp3-player-firmware
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{{{ github.run_number }}}}
          name: "ESP32-S3 MP3 Player Build #${{{{ github.run_number }}}}"
          body: |
            ## ESP32-S3 MP3 Player Firmware
            ### Files:
            - `bootloader.bin` - Bootloader
            - `partition-table.bin` - Partition table
            - `esp32s3_mp3_player.bin` - Application firmware
            - `firmware_merged.bin` - Complete merged firmware
            
            ### Flashing:
            ```
            esptool.py --chip esp32s3 -p COM_PORT write_flash 0x0 firmware_merged.bin
            ```
          files: |
            artifacts/*.bin
          make_latest: true
